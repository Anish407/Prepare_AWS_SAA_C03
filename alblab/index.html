<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECS HTML Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 700px;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    p {
      line-height: 1.6;
      font-size: 18px;
    }
    .small {
      font-size: 14px;
      color: #6b7280;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from ECS behind ALB and CloudFront</h1>
    <p>This sample HTML page is running in a container on ECS Fargate.</p>
    <p>Next lab: replace this with a .NET 8 API.</p>
    <div class="small">Lab version 1</div>
  </div>
</body>
</html>
